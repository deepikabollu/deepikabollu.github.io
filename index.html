
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1rem 0; font-family: var(--font-sans); }
.header { margin-bottom: 1.25rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; }
.tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.25rem; }
.tab { padding: 9px 18px; font-size: 14px; border-bottom: 2px solid transparent; cursor: pointer; color: var(--color-text-secondary); }
.tab.active { color: var(--color-text-primary); border-bottom-color: #003A8C; font-weight: 500; }
.planner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
select { width: 100%; padding: 9px 12px; font-size: 14px; font-family: var(--font-sans); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.btn-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
button { font-family: var(--font-sans); font-size: 13px; padding: 9px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
button:hover { background: var(--color-background-secondary); }
button.primary { background: #003A8C; color: #fff; border-color: #003A8C; }
button.primary:hover { background: #002d6e; }
#map { width: 100%; height: 380px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.25rem; }
.result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.route-step { display: flex; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.route-step:last-child { border-bottom: none; }
.line-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.step-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.step-detail { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.transfer-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--color-background-info); color: var(--color-text-info); margin-left: 6px; }
.section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.arrivals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.arrival-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; }
.arrival-line { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.arrival-time { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.arrival-dest { font-size: 12px; color: var(--color-text-secondary); }
.error-msg { font-size: 14px; color: var(--color-text-secondary); padding: 1rem 0; text-align: center; }

function buildGraph() {
  const graph = {}, stationLines = {};
  for (const [line, data] of Object.entries(LINES)) {
    for (let i = 0; i < data.stops.length; i++) {
      const s = data.stops[i];
      if (!graph[s]) graph[s] = [];
      if (!stationLines[s]) stationLines[s] = [];
      if (!stationLines[s].includes(line)) stationLines[s].push(line);
      if (i > 0) {
        const prev = data.stops[i-1];
        if (!graph[s].find(e=>e.to===prev)) graph[s].push({to:prev,line,time:3});
        if (!graph[prev]) graph[prev]=[];
        if (!graph[prev].find(e=>e.to===s)) graph[prev].push({to:s,line,time:3});
      }
    }
  }
  return {graph,stationLines};
}

const {graph,stationLines} = buildGraph();
const allStations = [...new Set(Object.values(LINES).flatMap(l=>l.stops))].sort();

let map, markers={}, routeLayer=null;

function initMap() {
  map = L.map('map',{zoomControl:true}).setView([42.3601,-71.0589],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:18
  }).addTo(map);

  for (const [line, data] of Object.entries(LINES)) {
    const coords = data.stops.map(s=>COORDS[s]).filter(Boolean);
    L.polyline(coords,{color:data.color,weight:3,opacity:0.7}).addTo(map);
  }

  for (const [name, coord] of Object.entries(COORDS)) {
    const lines = stationLines[name]||[];
    const color = lines.length>1?'#fff':(LINES[lines[0]]?.color||'#888');
    const isTransfer = lines.length>1;
    const circle = L.circleMarker(coord,{
      radius: isTransfer?7:5,
      fillColor: isTransfer?'#222':color,
      color: isTransfer?color:'#fff',
      weight: isTransfer?2:1.5,
      fillOpacity:1
    }).addTo(map).bindPopup(`<b>${name}</b><br><span style="font-size:12px;color:#666;">${lines.map(l=>l+' Line').join(', ')}</span>`);
    markers[name]=circle;
  }
}

function highlightRoute(path) {
  if (routeLayer) { routeLayer.forEach(l=>map.removeLayer(l)); }
  routeLayer=[];
  Object.values(markers).forEach(m=>{ m.setStyle({opacity:0.3,fillOpacity:0.3}); });
  const coords = path.map(p=>COORDS[p.station]).filter(Boolean);
  const line = L.polyline(coords,{color:'#FFD700',weight:6,opacity:0.9}).addTo(map);
  routeLayer.push(line);
  path.forEach(p=>{
    if (markers[p.station]) {
      markers[p.station].setStyle({opacity:1,fillOpacity:1,radius:8,fillColor:'#FFD700',color:'#333',weight:2});
      routeLayer.push(markers[p.station]);
    }
  });
  if (coords.length) map.fitBounds(L.latLngBounds(coords).pad(0.2));
}

function clearMapHighlight() {
  if (routeLayer) { routeLayer.forEach(l=>{ try{map.removeLayer(l);}catch(e){} }); routeLayer=null; }
  for (const [name,m] of Object.entries(markers)) {
    const lines = stationLines[name]||[];
    const color = lines.length>1?'#fff':(LINES[lines[0]]?.color||'#888');
    const isTransfer = lines.length>1;
    m.setStyle({radius:isTransfer?7:5,fillColor:isTransfer?'#222':color,color:isTransfer?color:'#fff',weight:isTransfer?2:1.5,fillOpacity:1,opacity:1});
  }
}

function populateDropdowns() {
  ['from-station','to-station','arrival-station'].forEach(id=>{
    const sel=document.getElementById(id);
    const ph=sel.options[0];
    sel.innerHTML='';
    sel.appendChild(ph);
    allStations.forEach(s=>{
      const o=document.createElement('option');
      o.value=s; o.textContent=s; sel.appendChild(o);
    });
  });
}

function findBFS(start,end) {
  if(start===end) return [{station:start,line:null}];
  const visited=new Set(), queue=[[start,[{station:start,line:null}]]];
  visited.add(start);
  while(queue.length){
    const [cur,path]=queue.shift();
    for(const edge of (graph[cur]||[])){
      if(visited.has(edge.to)) continue;
      visited.add(edge.to);
      const np=[...path,{station:edge.to,line:edge.line}];
      if(edge.to===end) return np;
      queue.push([edge.to,np]);
    }
  }
  return null;
}

function buildRouteSteps(path) {
  const steps=[];
  let segStart=path[0].station, segLine=path[1]?.line, segStops=[segStart];
  for(let i=1;i<path.length;i++){
    const node=path[i];
    if(node.line!==segLine&&i<path.length){
      steps.push({from:segStart,to:path[i-1].station,line:segLine,stops:segStops});
      segStart=path[i-1].station; segLine=node.line; segStops=[segStart];
    }
    segStops.push(node.station);
    if(i===path.length-1) steps.push({from:segStart,to:node.station,line:segLine,stops:segStops});
  }
  return steps;
}

function lineColor(line){ if(!line)return'#888'; if(line.startsWith('Green'))return'#00843D'; return(LINES[line]||{}).color||'#888'; }
function lineLabel(line){ if(!line)return''; if(line.startsWith('Green'))return'Green Line ('+line.split('-')[1]+' branch)'; return line+' Line'; }

function findRoute() {
  const from=document.getElementById('from-station').value;
  const to=document.getElementById('to-station').value;
  const el=document.getElementById('route-result');
  if(!from||!to){el.innerHTML='<p class="error-msg">Please select both stations.</p>';return;}
  if(from===to){el.innerHTML='<p class="error-msg">Start and destination are the same.</p>';return;}
  const path=findBFS(from,to);
  if(!path){el.innerHTML='<p class="error-msg">No route found.</p>';return;}
  highlightRoute(path);
  const steps=buildRouteSteps(path);
  const totalStops=path.length-1;
  const totalTime=totalStops*3+(steps.length-1)*5;
  let html=`<div class="result-card"><div class="section-title" style="margin-bottom:12px;">${from} → ${to} &nbsp;·&nbsp; ~${totalTime} min &nbsp;·&nbsp; ${totalStops} stop${totalStops!==1?'s':''}${steps.length>1?`<span class="transfer-badge">${steps.length-1} transfer${steps.length>2?'s':''}</span>`:''}</div>`;
  steps.forEach((step,i)=>{
    const sc=step.stops.length-1;
    html+=`<div class="route-step"><div class="line-dot" style="background:${lineColor(step.line)};"></div><div class="step-info"><div class="step-title">${i>0?'Transfer to ':'Board '}${lineLabel(step.line)}</div><div class="step-detail">${i>0?'at <strong>'+step.from+'</strong>, ':'at <strong>'+step.from+'</strong> — '}ride ${sc} stop${sc!==1?'s':''} to <strong>${step.to}</strong></div></div></div>`;
  });
  html+=`<div class="route-step" style="padding-top:10px;"><div style="width:13px;height:13px;border-radius:50%;background:var(--color-background-info);border:2px solid #003A8C;flex-shrink:0;margin-top:3px;"></div><div class="step-info"><div class="step-title">Arrive at ${to}</div></div></div></div>`;
  el.innerHTML=html;
}

function clearRoute() {
  document.getElementById('route-result').innerHTML='';
  clearMapHighlight();
}

function swapStations() {
  const f=document.getElementById('from-station'),t=document.getElementById('to-station');
  const tmp=f.value; f.value=t.value; t.value=tmp; clearRoute();
}

const API_KEY = 'dfa5462332104092ac3230690842c6b3';
async function fetchArrivals() {
  const station=document.getElementById('arrival-station').value;
  const el=document.getElementById('arrivals-result');
  if(!station) return;
  el.innerHTML='<p class="error-msg">Loading live arrivals...</p>';
  try {
    const sr=await fetch(`https://api-v3.mbta.com/stops?api_key=${API_KEY}&filter[route_type]=0,1&filter[name]=${encodeURIComponent(station)}`);
    const sd=await sr.json();
    if(!sd.data?.length){el.innerHTML='<p class="error-msg">Station not found.</p>';return;}
    const stopId=sd.data[0].id;
    const pr=await fetch(`https://api-v3.mbta.com/predictions?api_key=${API_KEY}&filter[stop]=${stopId}&include=route&sort=arrival_time&page[limit]=8`);
    const pd=await pr.json();
    if(!pd.data?.length){el.innerHTML='<p class="error-msg">No live predictions right now.</p>';return;}
    const routes={};
    (pd.included||[]).forEach(r=>{if(r.type==='route')routes[r.id]=r;});
    const rColors={Red:'#DA291C',Orange:'#ED8B00',Blue:'#003DA5','Green-B':'#00843D','Green-C':'#00843D','Green-D':'#00843D','Green-E':'#00843D','741':'#7C878E'};
    const now=Date.now();
    const cards=pd.data.slice(0,6).map(p=>{
      const t=p.attributes.arrival_time||p.attributes.departure_time;
      const route=routes[p.relationships?.route?.data?.id]||{};
      const rId=route.id||'';
      const rName=route.attributes?.long_name||rId;
      const dest=p.attributes.headsign||'Unknown';
      const mins=t?Math.max(0,Math.round((new Date(t)-now)/60000)):null;
      const col=rColors[rId]||'#888';
      const ts=mins===null?'N/A':mins===0?'Now':`${mins} min`;
      return `<div class="arrival-card"><div class="arrival-line" style="color:${col};">${rName}</div><div class="arrival-time">${ts}</div><div class="arrival-dest">toward ${dest}</div></div>`;
    }).join('');
    el.innerHTML=`<div class="section-title" style="margin-bottom:10px;">Live arrivals — ${station}</div><div class="arrivals-grid">${cards}</div><p style="font-size:12px;color:var(--color-text-secondary);margin-top:10px;">Powered by MBTA V3 API</p>`;
  } catch(e) {
    el.innerHTML='<p class="error-msg">Could not load live data.</p>';
  }
}

function showTab(name) {
  document.getElementById('tab-route').style.display=name==='route'?'block':'none';
  document.getElementById('tab-arrivals').style.display=name==='arrivals'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&name==='route')||(i===1&&name==='arrivals')));
  if(name==='route'&&map) setTimeout(()=>map.invalidateSize(),100);
}

populateDropdowns();
setTimeout(initMap, 100);
</script>
